<!DOCTYPE html>
<html>
<head>
  <title>India Gadgets Payment</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body style="font-family: Arial; text-align:center; margin-top:50px;">

  <h2>Pay ₹500</h2>
  <button onclick="payNow()" id="payBtn">Pay Now</button>

  <p id="status"></p>

  <script>
    async function payNow() {
      try {
        document.getElementById("status").innerText = "⏳ Creating order...";
        document.getElementById("payBtn").disabled = true;

        // STEP 1: Create Order
        const res = await fetch("https://payment-backend-wj3i.onrender.com/create-order", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ amount: 500 })
        });

        if (!res.ok) throw new Error("Order creation failed");

        const data = await res.json();

        const options = {
          key: "rzp_test_Sevhd81TySbeVV",
          amount: data.order.amount,
          currency: "INR",
          name: "India Gadgets",
          description: "Order Payment",
          order_id: data.order.id,

          // ✅ PAYMENT SUCCESS HANDLER
          handler: async function (response) {
            try {
              document.getElementById("status").innerText = "🔍 Verifying payment...";

              const verifyRes = await fetch("https://payment-backend-wj3i.onrender.com/verify-payment", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  razorpay_order_id: response.razorpay_order_id,
                  razorpay_payment_id: response.razorpay_payment_id,
                  razorpay_signature: response.razorpay_signature
                })
              });

              if (!verifyRes.ok) throw new Error("Verification failed");

              const verifyData = await verifyRes.json();

              if (verifyData.success) {
                alert("✅ Payment Successful");

                // ✅ FIXED REDIRECT
                window.location.href = "/success.html";

              } else {
                alert("❌ Payment verification failed");
              }

            } catch (err) {
              console.log(err);
              alert("⚠️ Server error during verification");
            }
          },

          modal: {
            ondismiss: function () {
              document.getElementById("status").innerText = "❌ Payment cancelled";
              document.getElementById("payBtn").disabled = false;
            }
          },

          theme: {
            color: "#3399cc"
          }
        };

        const rzp = new Razorpay(options);
        rzp.open();

      } catch (err) {
        console.log(err);
        document.getElementById("status").innerText = "❌ Something went wrong";
        document.getElementById("payBtn").disabled = false;
      }
    }
  </script>

</body>
</html>
